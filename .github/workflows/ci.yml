name: CI

on:
  push:
    branches:
      - main
      - 'changeset-release/main'
  pull_request:
    paths:
      - .changeset/**
      - .github/workflows/ci.yml
      - 'core/**'
      - 'plugins/**'
      - 'tools/**'
      - 'e2e/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - name: Install pnpm
        run: corepack enable
      - name: Use Node
        uses: actions/setup-node@65d868f8d4d85d7d4abb7de0875cde3fcc8798f5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --ignore-scripts
      - name: Lint
        run: pnpm lint
      - name: Format
        run: pnpm format:check
  test:
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        node_version: [22, 24]
    name: ${{ matrix.os }} / Node ${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - name: Install pnpm
        run: corepack enable
      - name: Use Node ${{ matrix.node_version }}
        uses: actions/setup-node@65d868f8d4d85d7d4abb7de0875cde3fcc8798f5
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
  e2e:
    needs: test
    runs-on: ubuntu-latest
    name: E2E Tests
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - name: Install pnpm
        run: corepack enable
      - name: Use Node
        uses: actions/setup-node@65d868f8d4d85d7d4abb7de0875cde3fcc8798f5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build
        run: pnpm build
      - name: E2E Tests
        run: pnpm test:e2e
